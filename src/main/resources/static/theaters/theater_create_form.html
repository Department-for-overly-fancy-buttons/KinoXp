<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theater</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<form id="theater-form">
    <input type="text" name="theaterName" placeholder="name" required>
    <input type="text" name="location" placeholder="location" required>
    <input id="rows" type="number" name="numberOfRows" placeholder="10" required>
    <input id="seats" type="number" name="seatsPerRow" placeholder="10" required>

    <h2>Select ticket types for rows</h2>
    <div id="rowContainer"></div>
    <button type="submit" id="submitTheater">Add theater</button>
</form>
<script src="createTheater.js"></script>
<script src="../Login/auth.js"></script>
</body>
</html>
